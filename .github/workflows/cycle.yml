name: 6-Hour Pipeline Cycle

# Runs ONE full content-pipeline cycle every 6 hours, UTC-aligned:
#   aggregate -> rank -> top10 -> synthesize -> publish.
#
# The orchestrator (src/cli.ts) derives the cycle from floor(now, 6h) UTC, spawns
# the four engine CLIs, and writes the artifact store. It is idempotent per
# cycle.id and last-good-wins: a failed cycle publishes NOTHING and the previous
# cycle keeps serving. The CLI exit code (1 = failed) drives that at the deploy
# layer too — the publish step below only runs when the cycle succeeded.
#
# Engine version pinning (issue #1):
#   Set repo VARIABLES (not secrets) to lock each engine to a known-good ref:
#     ENGINE_AGGREGATOR_REF   (default: main)
#     ENGINE_RANKING_REF      (default: main)
#     ENGINE_TOP10_REF        (default: main)
#     ENGINE_SYNTHESIZER_REF  (default: main)
#   To promote a new engine version: bump the variable in repo settings.
#   To backfill with a specific engine snapshot: use workflow_dispatch overrides.
#   See docs/spec.md §3 for the full promotion flow.

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC — the cycle window boundaries.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      at:
        description: 'Backfill a specific cycle (ISO 8601, e.g. 2026-06-11T06:00:00Z)'
        required: false
      aggregator_ref:
        description: 'Override ENGINE_AGGREGATOR_REF for this run only'
        required: false
      ranking_ref:
        description: 'Override ENGINE_RANKING_REF for this run only'
        required: false
      top10_ref:
        description: 'Override ENGINE_TOP10_REF for this run only'
        required: false
      synthesizer_ref:
        description: 'Override ENGINE_SYNTHESIZER_REF for this run only'
        required: false

concurrency:
  # Never run two cycles at once; let an in-flight cycle finish (no cancel).
  group: ardur-pipeline-cycle
  cancel-in-progress: false

permissions:
  contents: write # push the published artifacts to the `published` data branch

env:
  ENGINES_DIR: ${{ github.workspace }}
  ARTIFACT_STORE: ${{ github.workspace }}/ardur-pipeline/.artifacts
  # Cost-guarded, pluggable provider. Default deterministic (budget=0, zero-cost).
  ARDUR_AI_PROVIDER: ${{ vars.ARDUR_AI_PROVIDER || 'deterministic' }}
  ARDUR_AI_MAX_GENERATIONS: ${{ vars.ARDUR_AI_MAX_GENERATIONS || '0' }}
  ARDUR_AI_TIMEOUT_MS: ${{ vars.ARDUR_AI_TIMEOUT_MS || '20000' }}
  PUBLISHED_CYCLES_TO_KEEP: ${{ vars.PUBLISHED_CYCLES_TO_KEEP || '40' }}
  OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
  ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
  LOG_FORMAT: json

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v4
        with:
          path: ardur-pipeline

      # The four engines are checked out as siblings under ENGINES_DIR.
      # Each ref resolves: workflow_dispatch override > repo variable > main.
      # To pin a version: set ENGINE_<NAME>_REF as a repo variable in settings.
      # To promote: bump the variable once an engine cuts a known-good release.
      - name: Checkout aggregator
        uses: actions/checkout@v4
        with:
          repository: ArdurAI/ardur-news-aggregator
          path: ardur-news-aggregator
          ref: ${{ github.event.inputs.aggregator_ref || vars.ENGINE_AGGREGATOR_REF || 'main' }}

      - name: Checkout ranking engine
        uses: actions/checkout@v4
        with:
          repository: ArdurAI/ardur-ranking-engine
          path: ardur-ranking-engine
          ref: ${{ github.event.inputs.ranking_ref || vars.ENGINE_RANKING_REF || 'main' }}

      - name: Checkout top10 engine
        uses: actions/checkout@v4
        with:
          repository: ArdurAI/ardur-top10-engine
          path: ardur-top10-engine
          ref: ${{ github.event.inputs.top10_ref || vars.ENGINE_TOP10_REF || 'main' }}

      - name: Checkout synthesizer
        uses: actions/checkout@v4
        with:
          repository: ArdurAI/ardur-article-synthesizer
          path: ardur-article-synthesizer
          ref: ${{ github.event.inputs.synthesizer_ref || vars.ENGINE_SYNTHESIZER_REF || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install (orchestrator + engines)
        run: |
          for repo in ardur-pipeline ardur-news-aggregator ardur-ranking-engine ardur-top10-engine ardur-article-synthesizer; do
            echo "::group::npm install $repo"
            (cd "$repo" && (npm ci || npm install))
            echo "::endgroup::"
          done

      - name: Run one pipeline cycle
        id: run
        working-directory: ardur-pipeline
        env:
          AT_INPUT: ${{ github.event.inputs.at }}
        run: |
          AT_ARG=()
          if [ -n "$AT_INPUT" ]; then AT_ARG=(--at "$AT_INPUT"); fi
          set +e
          node --experimental-strip-types src/cli.ts "${AT_ARG[@]}" > "$RUNNER_TEMP/result.json"
          EXIT_CODE=$?
          STATUS=$(node -e "const fs=require('node:fs'); try { const r=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(r.status || 'unknown')); } catch { process.stdout.write('unknown'); }" "$RUNNER_TEMP/result.json")
          echo "exit=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          set -e
          {
            echo "### ardur-pipeline cycle result"
            echo '```json'
            cat "$RUNNER_TEMP/result.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact store (always, for observability)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ github.run_id }}
          path: ardur-pipeline/.artifacts
          if-no-files-found: ignore
          retention-days: 14

      # Publish only on a successful cycle (exit 0). On failure the previous
      # cycle's published branch is untouched — last-good-wins at the deploy layer.
      - name: Publish to `published` data branch
        if: steps.run.outputs.exit == '0' && (steps.run.outputs.status == 'published' || steps.run.outputs.status == 'degraded')
        working-directory: ardur-pipeline
        run: |
          if ! [[ "$PUBLISHED_CYCLES_TO_KEEP" =~ ^[0-9]+$ ]] || [ "$PUBLISHED_CYCLES_TO_KEEP" -lt 1 ]; then
            echo "::error::PUBLISHED_CYCLES_TO_KEEP must be a positive integer"
            exit 1
          fi
          git config user.name "ardur-pipeline[bot]"
          git config user.email "pipeline@ardur.ai"
          CYCLE_ID=$(node -e "const m=require('./.artifacts/manifest.json');process.stdout.write(m.cycle.id)")
          git fetch origin published --depth=1 || true
          git switch published 2>/dev/null || git switch --orphan published
          # Replace the served set with this cycle's manifest + latest + archive.
          rm -rf manifest.json latest cycles
          cp -R .artifacts/manifest.json .artifacts/latest .artifacts/cycles .
          if [ -d cycles ]; then
            find cycles -mindepth 1 -maxdepth 1 -type d \
              | sort -r \
              | tail -n +"$((PUBLISHED_CYCLES_TO_KEEP + 1))" \
              | while read -r old_cycle; do
                  echo "Pruning old published cycle: $old_cycle"
                  rm -rf "$old_cycle"
                done
          fi
          git add manifest.json latest cycles
          git commit -m "publish cycle ${CYCLE_ID}" || echo "nothing to publish"
          git push origin published

      # Optional: nudge Cloudflare Pages to rebuild ardur.ai against the fresh artifacts.
      - name: Trigger ardur.ai Cloudflare Pages rebuild
        if: steps.run.outputs.exit == '0' && (steps.run.outputs.status == 'published' || steps.run.outputs.status == 'degraded')
        env:
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$CF_PAGES_DEPLOY_HOOK" ]; then
            echo "no CF_PAGES_DEPLOY_HOOK; skipping Cloudflare Pages rebuild"
            exit 0
          fi
          curl -fsS -X POST "$CF_PAGES_DEPLOY_HOOK" >/dev/null
          echo "Cloudflare Pages Deploy Hook fired"

      - name: Fail the job if the cycle failed
        if: steps.run.outputs.exit != '0'
        run: |
          echo "::error::pipeline cycle failed; nothing published, previous cycle stays live"
          exit 1
